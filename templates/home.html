<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FWI Prediction</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{

background:linear-gradient(135deg,#141e30,#243b55);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;

}

.container{

background:white;
width:450px;
padding:30px;
border-radius:15px;
box-shadow:0px 10px 30px rgba(0,0,0,.3);

}

h1{

text-align:center;
margin-bottom:25px;
color:#243b55;

}

input{

width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
font-size:15px;

}

input:focus{

outline:none;
border:1px solid #00b894;

}

button{

width:100%;
padding:14px;
margin-top:15px;
background:#243b55;
color:white;
font-size:17px;
border:none;
border-radius:8px;
cursor:pointer;

}

button:hover{

background:#1d2f46;

}

.result{

margin-top:25px;
background:#dff9fb;
padding:15px;
border-radius:8px;
text-align:center;
font-size:18px;
font-weight:bold;
color:#130f40;

}

</style>

</head>

<body>

<div class="container">

<h1>🔥 FWI Prediction</h1>

<form action="{{ url_for('predict_datapoint') }}" method="POST">

<input type="number" step="any" name="Temperature" placeholder="Temperature" required>

<input type="number" step="any" name="RH" placeholder="Relative Humidity" required>

<input type="number" step="any" name="WS" placeholder="Wind Speed" required>

<input type="number" step="any" name="Rain" placeholder="Rain" required>

<input type="number" step="any" name="FFMC" placeholder="FFMC" required>

<input type="number" step="any" name="DMC" placeholder="DMC" required>

<input type="number" step="any" name="ISI" placeholder="ISI" required>

<input type="number" step="any" name="Classes" placeholder="Classes (0 or 1)" required>

<input type="number" step="any" name="Region" placeholder="Region (0 or 1)" required>

<button type="submit">Predict FWI</button>

</form>

{% if prediction_text %}
<div class="result">
{{ prediction_text }}
</div>
{% endif %}

</div>

</body>
</html>
